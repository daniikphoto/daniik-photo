<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080706">
<title>Daniik — Photography</title>
<meta name="description" content="Sports, portraits and events photography by @daniik_photo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT & BASE
═══════════════════════════════════════════ */
:root {
  --ink: #080706;
  --ink-alt: #0d0c0b;
  --paper: #f4f1ee;
  --gold: #c8a97e;
  --gold-muted: rgba(200, 169, 126, 0.4);
  --muted: #8a847c;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Jost', sans-serif;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { 
  font-family: var(--sans); background: var(--ink); color: var(--paper); 
  overflow-x: hidden; -webkit-font-smoothing: antialiased; 
}
img { display: block; max-width: 100%; height: auto; object-fit: cover; }
a { color: inherit; text-decoration: none; }

/* ═══════════════════════════════════════════
   CINEMATIC LOADER
═══════════════════════════════════════════ */
#ldr {
  position: fixed; inset: 0; z-index: 9999; background: var(--ink);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: transform 1s var(--ease), visibility 1s;
}
#ldr.out { transform: translateY(-100%); visibility: hidden; }
.ldr-text { font-family: var(--serif); font-size: 2rem; letter-spacing: 0.3em; overflow: hidden; }
.ldr-text span { display: block; transform: translateY(110%); animation: ldrText 0.8s var(--ease) forwards; }
.ldr-bar { width: 100px; height: 1px; background: var(--gold-muted); margin-top: 2rem; position: relative; overflow: hidden; }
.ldr-bar::after { 
    content: ''; position: absolute; inset: 0; background: var(--gold); 
    transform: scaleX(0); transform-origin: left; animation: ldrBar 2s var(--ease) forwards; 
}
@keyframes ldrText { to { transform: translateY(0); } }
@keyframes ldrBar { to { transform: scaleX(1); } }

/* ═══════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════ */
#cur { position: fixed; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 10000; mix-blend-mode: difference; transition: transform 0.2s; }
#cur-ring { 
    position: fixed; width: 40px; height: 40px; border: 1px solid var(--gold-muted); border-radius: 50%; 
    pointer-events: none; z-index: 9999; transition: transform 0.15s ease-out, width 0.3s, height 0.3s; 
}
body.hovering #cur-ring { width: 80px; height: 80px; background: rgba(200, 169, 126, 0.1); border-color: var(--gold); }
#cur-ring::after { 
    content: 'VIEW'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    font-size: 0.5rem; letter-spacing: 0.2em; color: var(--gold); opacity: 0; 
}
body.hovering #cur-ring::after { opacity: 1; }

/* ═══════════════════════════════════════════
   NAVIGATION (Matches Screenshot)
═══════════════════════════════════════════ */
nav { 
    position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
    padding: 2.5rem 3rem; display: flex; justify-content: space-between; align-items: center; 
}
.logo { font-family: var(--serif); font-size: 1.4rem; letter-spacing: 0.15em; font-weight: 300; }
.logo em { font-style: italic; color: var(--gold); }

.nav-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 3rem; }
.nav-center a { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.6; transition: opacity 0.3s; }
.nav-center a:hover { opacity: 1; }

.btn-book { 
    border: 1px solid var(--gold-muted); padding: 0.8rem 1.8rem; font-size: 0.6rem; 
    text-transform: uppercase; letter-spacing: 0.25em; transition: all 0.4s; 
}
.btn-book:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

/* ═══════════════════════════════════════════
   HERO & GHOST TEXT
═══════════════════════════════════════════ */
.hero { height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
.hero-img { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
.hero-img img { width: 100%; height: 100%; filter: brightness(0.4); transform: scale(1.1); animation: heroScale 10s infinite alternate linear; }
@keyframes heroScale { to { transform: scale(1); } }

.hero-ghost { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    font-family: var(--serif); font-size: 40vw; color: rgba(200, 169, 126, 0.03); 
    white-space: nowrap; pointer-events: none; z-index: 2; 
}

.hero-content { position: relative; z-index: 3; text-align: center; }
.hero-title { font-family: var(--serif); font-size: clamp(3rem, 10vw, 8rem); font-weight: 300; line-height: 0.9; margin-bottom: 2rem; }
.hero-title em { font-style: italic; color: var(--gold); }

/* ═══════════════════════════════════════════
   SIDE-BY-SIDE GALLERY (Matches Screenshot)
═══════════════════════════════════════════ */
.gal-section { background: var(--ink); padding: 10vh 0; }
.gal-container { 
    display: flex; gap: 2px; height: 85vh; padding: 0 1rem; 
    cursor: none; overflow: hidden;
}
.gal-item { flex: 1; height: 100%; position: relative; overflow: hidden; transition: flex 0.8s var(--ease); }
.gal-item:hover { flex: 1.5; }
.gal-item img { width: 100%; height: 100%; transition: transform 1.2s var(--ease); }
.gal-item:hover img { transform: scale(1.05); }

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
.reveal { opacity: 0; transform: translateY(30px); transition: all 1s var(--ease); }
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    nav { padding: 1.5rem; }
    .nav-center { display: none; }
    .gal-container { flex-direction: column; height: auto; gap: 2rem; }
    .gal-item { height: 60vh; }
}
</style>
</head>
<body>

<div id="ldr">
    <div class="ldr-text"><span>DANIIK</span></div>
    <div class="ldr-bar"></div>
</div>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
    <a href="#" class="logo">Dan<em>iik</em></a>
    <div class="nav-center">
        <a href="#work">Work</a>
        <a href="#about">About</a>
        <a href="#pricing">Pricing</a>
    </div>
    <a href="#booking" class="btn-book">Book Session</a>
</nav>

<section class="hero">
    <div class="hero-ghost">DANIIK</div>
    <div class="hero-img">
        <img src="images/IMG_4556.jpg" alt="Background">
    </div>
    <div class="hero-content reveal">
        <h1 class="hero-title">Moments<br>That <em>Breathe</em></h1>
    </div>
</section>

<section class="gal-section" id="work">
    <div class="gal-container" id="galRow">
        </div>
</section>

<script>
const IMGS = ["images/IMG_4529.jpg","images/IMG_4650.jpg","images/IMG_4668.jpg","images/IMG_4728.jpg","images/IMG_4853.jpg"];

// Loader
window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('ldr').classList.add('out'), 2000);
});

// Cursor
const cur = document.getElementById('cur'), ring = document.getElementById('cur-ring');
document.addEventListener('mousemove', e => {
    cur.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
    ring.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
});

// Gallery Injection
const galRow = document.getElementById('galRow');
IMGS.forEach(src => {
    const item = document.createElement('div');
    item.className = 'gal-item';
    item.innerHTML = `<img src="${src}" alt="Portfolio Image">`;
    item.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    item.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    galRow.appendChild(item);
});

// Reveal Observer
const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>

</body>
</html>
