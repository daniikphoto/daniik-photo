<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniik — Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0e0d0c; --paper: #f5f1eb; --warm: #c8a97e;
    --muted: #8a8077; --serif: 'Cormorant Garamond', serif; --sans: 'Jost', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--ink); color: var(--paper); overflow-x: hidden; cursor: none; }

  /* Custom Cursor */
  .cursor { position: fixed; width: 10px; height: 10px; background: var(--warm); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease; transform: translate(-50%,-50%); }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(200,169,126,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.8rem 3rem; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; }
  .logo { font-family: var(--serif); font-size: 1.3rem; letter-spacing: 0.12em; color: var(--paper); text-decoration: none; }
  .logo em { font-style: italic; color: var(--warm); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
  .nav-links a { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--paper); text-decoration: none; opacity: 0.7; }

  /* Hero Section Fixed */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 0.8fr; position: relative; overflow: hidden; }
  .hero-left { display: flex; flex-direction: column; justify-content: flex-end; padding: 8rem 3rem 5rem; z-index: 2; }
  .hero-title { font-family: var(--serif); font-size: clamp(3.5rem, 6vw, 6rem); font-weight: 300; line-height: 1.05; margin-bottom: 2rem; }
  .hero-title em { font-style: italic; color: var(--warm); }
  .hero-right { position: relative; width: 100%; height: 100vh; }
  .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

  /* Auto-Slider Styles */
  .slider-section { padding: 6rem 0; position: relative; }
  .slider-wrapper { position: relative; width: 100%; overflow: hidden; }
  .slider-container { 
    display: flex; 
    gap: 20px; 
    padding: 0 3rem; 
    overflow-x: auto; 
    scroll-snap-type: x mandatory; 
    scrollbar-width: none; 
    scroll-behavior: smooth;
  }
  .slider-container::-webkit-scrollbar { display: none; }
  
  .slide { 
    min-width: 60vw; 
    height: 75vh; 
    flex-shrink: 0; 
    scroll-snap-align: center; 
    overflow: hidden; 
    position: relative;
  }
  .slide img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s cubic-bezier(0.23,1,0.32,1); filter: grayscale(20%); }
  
  /* Arrows Hidden by Default - Show on Hover */
  .slider-nav { 
    position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; 
    padding: 0 4rem; pointer-events: none; opacity: 0; transition: opacity 0.4s ease; z-index: 10;
  }
  .slider-section:hover .slider-nav { opacity: 1; }
  .s-btn { 
    background: rgba(14, 13, 12, 0.6); border: 1px solid var(--warm); color: var(--warm); 
    width: 60px; height: 60px; border-radius: 50%; pointer-events: auto; cursor: none;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  }

  /* Booking & Pricing */
  .booking-section { padding: 8rem 3rem; border-top: 1px solid rgba(200,169,126,0.12); }
  .price-calc-wrap { background: rgba(200,169,126,0.03); border: 1px solid rgba(200,169,126,0.1); padding: 3rem; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 4rem; }
  .time-option { padding: 1.5rem; border: 1px solid rgba(200,169,126,0.2); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: none; }
  .time-option.active { border-color: var(--warm); background: rgba(200,169,126,0.08); }
  .est-value { font-family: var(--serif); font-size: 5rem; line-height: 1; }
  .fg input, .fg textarea { background: transparent; border: none; border-bottom: 1px solid rgba(200,169,126,0.25); color: var(--paper); padding: 0.75rem 0; outline: none; width: 100%; font-family: var(--sans); }
  .bsubmit { background: var(--warm); color: var(--ink); border: none; padding: 1.2rem; cursor: none; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; width: 100%; }

  .reveal { opacity:0; transform:translateY(30px); transition: 0.9s ease-out; }
  .reveal.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="#" class="logo">Dan<em>iik</em></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#booking" style="color: var(--warm); border: 1px solid var(--warm); padding: 0.5rem 1rem;">Book Session</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1 class="hero-title">Capturing<br>moments<br>that <em>breathe</em></h1>
    <p style="color: var(--muted); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase;">Fine Art & Editorial Photography</p>
  </div>
  <div class="hero-right">
    <img class="hero-img" src="images/IMG_4556.jpg" alt="Daniik Hero">
  </div>
</section>

<section class="slider-section" id="work">
  <div class="reveal" style="padding-left: 3rem; margin-bottom: 2rem;">
    <h2 style="font-family: var(--serif); font-size: 3rem; font-weight: 300;">Selected <em>Works</em></h2>
  </div>

  <div class="slider-wrapper">
    <div class="slider-container" id="slider">
      <div class="slide"><img src="images/IMG_5411.jpg"></div>
      <div class="slide"><img src="images/IMG_5415.jpg"></div>
      <div class="slide"><img src="images/IMG_5418.jpg"></div>
      <div class="slide"><img src="images/IMG_5439.jpg"></div>
      <div class="slide"><img src="images/IMG_4650.jpg"></div>
      <div class="slide"><img src="images/IMG_4853.jpg"></div>
      <div class="slide"><img src="images/IMG_5583.jpg"></div>
      <div class="slide"><img src="images/IMG_5747.jpg"></div>
    </div>
    
    <div class="slider-nav">
      <button class="s-btn" id="prevBtn">←</button>
      <button class="s-btn" id="nextBtn">→</button>
    </div>
  </div>
</section>

<section class="booking-section" id="booking">
  <div class="price-calc-wrap reveal">
    <div class="duration-selector">
      <div class="time-option" data-time="15-45min" data-price="15"><span>15 — 45 Minutes</span><span>$15</span></div>
      <div class="time-option" data-time="45min-2hr" data-price="30"><span>45 Min — 2 Hours</span><span>$30</span></div>
      <div class="time-option" data-time="2hr-3hr" data-price="45"><span>2 — 3 Hours</span><span>$45</span></div>
      <div class="time-option" data-time="3hr+" data-price="55"><span>3+ Hours</span><span>$55</span></div>
    </div>
    <div class="est-price-box">
      <p style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: var(--warm);">Total Investment</p>
      <h3 class="est-value" id="displayPrice">$0</h3>
      <p style="font-size: 0.6rem; color: var(--muted); margin-top: 10px;">Edits Included</p>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; padding-top: 4rem;">
    <form action="https://formspree.io/f/mlgalbve" method="POST" class="reveal">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <div class="fg"><label>First Name</label><input type="text" name="fname" required></div>
          <div class="fg"><label>Last Name</label><input type="text" name="lname" required></div>
        </div>
        <div class="fg"><label>Email</label><input type="email" name="email" required></div>
        <input type="hidden" name="duration" id="inputDuration">
        <input type="hidden" name="price" id="inputPrice">
        <div class="fg"><label>Details</label><textarea name="message" rows="3"></textarea></div>
        <button type="submit" class="bsubmit">Request Booking</button>
    </form>
    <div class="reveal" style="font-size: 0.8rem; color: var(--muted); line-height: 2.5; border-left: 1px solid var(--warm); padding-left: 2rem;">
        ✦ Edited High-Res Gallery<br>✦ 25% Deposit Required<br>✦ 14-Day Delivery
    </div>
  </div>
</section>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
  (function anim(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();

  // Auto Slider Logic
  const slider = document.getElementById('slider');
  let isPaused = false;
  
  function autoScroll() {
    if(!isPaused) {
      if (slider.scrollLeft + slider.offsetWidth >= slider.scrollWidth) {
        slider.scrollTo({left: 0, behavior: 'smooth'});
      } else {
        slider.scrollBy({left: 400, behavior: 'smooth'});
      }
    }
  }

  let timer = setInterval(autoScroll, 3000);

  slider.addEventListener('mouseenter', () => isPaused = true);
  slider.addEventListener('mouseleave', () => isPaused = false);

  document.getElementById('nextBtn').addEventListener('click', () => {
    slider.scrollBy({left: 500, behavior: 'smooth'});
  });
  document.getElementById('prevBtn').addEventListener('click', () => {
    slider.scrollBy({left: -500, behavior: 'smooth'});
  });

  // Price Calc
  document.querySelectorAll('.time-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.time-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      document.getElementById('displayPrice').textContent = '$' + opt.dataset.price;
      document.getElementById('inputPrice').value = '$' + opt.dataset.price;
      document.getElementById('inputDuration').value = opt.dataset.time;
    });
  });

  // Reveal
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>

</body>
</html>
